<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Últimos Movimientos</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <!-- Navbar Responsive -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand font-weight-bold" href="menu.html">Alke Wallet</a>
      <a href="menu.html" class="btn btn-outline-light btn-sm">Volver al Menú</a>
    </div>
  </nav>

  <div class="container">
    <div class="card p-4 shadow-sm">
      <h3 class="text-primary mb-3">Historial de Transacciones</h3>
      <p class="text-muted">Revisa tus movimientos recientes realizados en la plataforma.</p>
      
      <div class="table-responsive">
        <table class="table table-striped align-middle">
          <thead class="table-primary">
            <tr>
              <th>Tipo</th>
              <th>Detalle</th>
              <th>Fecha</th>
              <th class="text-end">Monto</th>
            </tr>
          </thead>
          <tbody id="transactionList">
            <!-- Las filas se cargan dinámicamente desde wallet.js/main.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Scripts propios -->
  <script src="js/wallet.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
