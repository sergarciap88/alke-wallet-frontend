<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Realizar Depósito</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

  <!-- Navbar Responsive -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand font-weight-bold" href="menu.html">Alke Wallet</a>
      <a href="menu.html" class="btn btn-outline-light btn-sm">Volver al Menú</a>
    </div>
  </nav>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4 shadow-sm">
          <h3 class="text-center text-primary mb-3">Realizar Depósito</h3>
          <p class="text-center text-muted">Saldo actual: <strong>$<span id="currentBalance">0.00</span></strong></p>
          
          <form id="depositForm">
            <div class="mb-3">
              <label for="depositAmount" class="form-label">Monto a depositar ($)</label>
              <input type="number" class="form-control" id="depositAmount" min="1" step="0.01" placeholder="Ej: 1500" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Realizar Depósito</button>
          </form>

          <div id="depositAlert" class="alert mt-3 d-none" role="alert"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Scripts propios -->
  <script src="js/wallet.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
